{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Teach2Learn</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/theme.css' %}">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:24px;
        }

        .login-card{
            width:100%;
            max-width:440px;
            padding:42px 36px;
            border-radius:var(--radius-lg);
            background:var(--bg-surface);
            border:1px solid var(--border-color);
            box-shadow:var(--shadow-lg);
        }

        .login-brand{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            margin-bottom:22px;
        }
        .login-brand .brand-mark{
            width:42px;height:42px;border-radius:12px;
            display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg, var(--orange-500), var(--orange-600));
            color:#fff;font-size:1.2rem;
            box-shadow:var(--shadow-glow-orange);
        }
        .login-brand span{
            font-family:var(--font-heading);
            font-weight:800;
            font-size:1.3rem;
            color:var(--text-primary);
        }

        .login-card h2{
            text-align:center;
            margin-bottom:6px;
            font-weight:800;
            font-size:1.6rem;
        }
        .login-subtitle{
            text-align:center;
            color:var(--text-muted);
            font-size:.92rem;
            margin-bottom:28px;
        }

        .divider{
            text-align:center;
            margin:22px 0 18px;
            color:var(--gray-500);
            font-size:13px;
            position:relative;
            text-transform:uppercase;
            letter-spacing:.05em;
        }
        .divider::before,
        .divider::after{
            content:"";
            position:absolute;
            top:50%;
            width:38%;
            height:1px;
            background:var(--border-color);
        }
        .divider::before{ left:0; }
        .divider::after{ right:0; }

        .google-wrap{
            display:flex;
            justify-content:center;
            margin-top:6px;
        }

        .login-link{
            text-align:center;
            margin-top:24px;
            font-size:14px;
            color:var(--text-muted);
        }
        .login-link a{
            color:var(--orange-400);
            font-weight:700;
        }
        .login-link a:hover{ color:var(--orange-500); }

        .back-home{
            display:inline-flex;
            align-items:center;
            gap:6px;
            font-size:.85rem;
            color:var(--gray-400);
            margin-bottom:18px;
        }
        .back-home:hover{ color:var(--orange-400); }
    </style>
</head>
<body>

<div class="login-card" data-reveal>
    <a href="{% url 'home' %}" class="back-home"><i class="bi bi-arrow-left"></i> Back to home</a>

    <div class="login-brand">
        <div class="brand-mark"><i class="bi bi-mortarboard-fill"></i></div>
        <span>Teach2Learn</span>
    </div>

    <h2>Welcome back</h2>
    <p class="login-subtitle">Log in to continue learning and teaching.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-box">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login_view' %}">
        {% csrf_token %}

        <div class="neo-input">
            <i class="bi bi-envelope-fill"></i>
            <input type="email" placeholder="Email Address" name="email" required>
        </div>

        <div class="neo-input">
            <i class="bi bi-lock-fill"></i>
            <input type="password" placeholder="Password" name="password" required>
        </div>

        <button class="btn btn-main w-100" type="submit">Login</button>

        <div class="divider">or continue with</div>

        <div id="g_id_onload"
             data-client_id="534088856082-fmbpmuvqchgqe6vp1be83v9uu87t8ft2.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="google-wrap">
            <div class="g_id_signin"
                 data-type="standard"
                 data-theme="filled_black"
                 data-size="large"
                 data-shape="pill">
            </div>
        </div>

        <div class="login-link">
            Don't have an account?
            <a href="{% url 'register' %}">Register</a>
        </div>
    </form>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
function handleCredentialResponse(response){
    fetch("/google-login/", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            credential:response.credential
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            window.location.href="/";
        }else{
            alert("Google Login Failed\n" + data.error);
        }
    })
    .catch(error => {
        console.error(error);
    });
}
</script>

<script src="{% static 'js/animations.js' %}"></script>
</body>
</html>
