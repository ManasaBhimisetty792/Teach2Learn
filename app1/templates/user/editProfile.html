<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teach2Learn - Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg: #eef3f9;
      --surface: #f7faff;
      --surface-2: #eef4fb;
      --text: #243447;
      --muted: #6b7785;
      --border: #dbe5f0;
      --purple: #7c5cff;
      --purple-2: #a78bfa;
      --pink: #ff7aa2;
      --blue: #5aa9ff;
      --shadow-light: rgba(255,255,255,0.95);
      --shadow-dark: rgba(148,163,184,0.18);
      --shadow-inset-dark: rgba(148,163,184,0.16);
      --shadow-inset-light: rgba(255,255,255,0.95);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(145deg, #f4f8fd 0%, #e8eff7 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .page-title {
      margin: 0;
      font-size: clamp(1.5rem, 1.2rem + 1vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color:#4f3b78;
    }

    .subtle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.95rem;
    }

    .neo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: 14px 14px 28px var(--shadow-dark), -10px -10px 22px var(--shadow-light);
    }

    .neo-card-inner {
      padding: 22px;
    }

    .neo-btn {
      border: 0;
      border-radius: 14px;
      padding: 0.72rem 1.1rem;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      color:#7c5cff !important;
    }

    .neo-btn:hover { transform: translateY(-1px); }
    .neo-btn:active { transform: translateY(0); }

    .neo-btn-primary {
      color:white;
      background:#4f3b78;
      /* box-shadow: 10px 10px 22px rgba(124,92,255,0.24), -8px -8px 18px rgba(255,255,255,0.85); */
    }

    .neo-btn-secondary {
      color: var(--text);
      background: var(--surface);
      box-shadow: 10px 10px 20px rgba(148,163,184,0.12), -8px -8px 16px rgba(255,255,255,0.95);
      border: 1px solid var(--border);
    }

    .form-label {
      font-weight: 700;
      color: #334155;
      margin-bottom: 0.55rem;
    }

    .form-control {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      padding: 0.9rem 1rem;
      box-shadow: inset 6px 6px 12px var(--shadow-inset-dark), inset -6px -6px 12px var(--shadow-inset-light);
    }

    .form-control:focus {
      border-color: rgba(124,92,255,0.28);
      box-shadow: inset 6px 6px 12px rgba(148,163,184,0.14), inset -6px -6px 12px rgba(255,255,255,0.98), 0 0 0 0.22rem rgba(124,92,255,0.12);
    }

    textarea.form-control { min-height: 120px; }

    .profile-top {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }
  #color{
    color:#7c5cff !important;
  }
    #summaryImage {
      width: 128px;
      height: 128px;
      object-fit: cover;
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 12px 12px 24px rgba(148,163,184,0.14), -10px -10px 18px rgba(255,255,255,0.95);
      background: var(--surface);
    }

    .accent-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .pill {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.55);
    }

    .pill-purple { background: var(--purple); }
    .pill-blue { background: var(--blue); }
    .pill-pink { background: var(--pink); }

    .section-title {
      font-size: 1.08rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color:#4f3b78;
    }

    .text-muted-soft { color: var(--muted) !important; }

    @media (max-width: 768px) {
      .page-wrap { padding: 16px; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .profile-top { align-items: flex-start; }
      #summaryImage { width: 112px; height: 112px; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1 class="page-title">Edit Profile</h1>
      </div>
      <a href="{% url 'profile' %}" class="neo-btn neo-btn-secondary">
        <i class="bi bi-arrow-left"></i> Back to Profile
      </a>
    </div>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="neo-card mb-4">
        <div class="neo-card-inner">
          <div class="profile-top">
            {% if profile.profile_image %}
              <img id="summaryImage" alt="Profile image" src="{{ profile.profile_image.url }}">
            {% else %}
              <img id="summaryImage" alt="Profile image" src="https://via.placeholder.com/120?text=No+Image">
            {% endif %}

            <div class="flex-grow-1" style="min-width: 260px;">
              <label for="imageUpload" class="form-label text-danger" id="color">Upload Profile Image</label>
              <input type="file" name="profile_image" id="imageUpload" class="form-control" accept="image/*">
              <small class="text-muted-soft d-block mt-2">Upload JPG, PNG, or WEBP image up to 2MB.</small>
              <div class="accent-row">
                <span class="pill pill-purple"></span>
                <span class="pill pill-blue"></span>
                <span class="pill pill-pink"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="neo-card mb-4">
        <div class="neo-card-inner">
          <div class="section-title">Basic Information</div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" id="color">Full Name</label>
              <input type="text" name="full_name" class="form-control" value="{{ profile.full_name|default:'' }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" id="color">Professional Title</label>
              <input type="text" name="professional_title" class="form-control" value="{{ profile.professional_title|default:'' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label" id="color">Location</label>
              <input type="text" name="location" class="form-control" value="{{ profile.location|default:'' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label" id="color">Email</label>
              <input type="email" name="email" class="form-control" value="{{ profile.email|default:'' }}">
            </div>
            <div class="col-12">
              <label class="form-label" id="color">About Me / Bio</label>
              <textarea name="bio" class="form-control" rows="4">{{ profile.bio|default:'' }}</textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="neo-card mb-4">
        <div class="neo-card-inner">
          <div class="section-title">My Skills</div>
          <label class="form-label" id="color">Teach Skills</label>
          <input type="text" name="teach_skills" class="form-control mb-3" value="{% if profile.teach_skills %}{{ profile.teach_skills|join:', ' }}{% endif %}" placeholder="React, Django, Python">

          <label class="form-label" id="color">Learn Skills</label>
          <input type="text" name="learn_skills" class="form-control" value="{% if profile.learn_skills %}{{ profile.learn_skills|join:', ' }}{% endif %}" placeholder="MongoDB, AWS, DevOps">
          <small class="text-muted-soft d-block mt-2">Enter skills separated by commas.</small>
        </div>
      </div>

      <div class="neo-card mb-4">
        <div class="neo-card-inner">
          <div class="section-title ">Social Links</div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" id="color">LinkedIn</label>
              <input type="url" name="linkedin" class="form-control" value="{{ profile.linkedin|default:'' }}" placeholder="https://linkedin.com/in/username">
            </div>
            <div class="col-md-6">
              <label class="form-label" id="color">GitHub</label>
              <input type="url" name="github" class="form-control" value="{{ profile.github|default:'' }}" placeholder="https://github.com/username">
            </div>
            <div class="col-md-6">
              <label class="form-label" id="color">Twitter</label>
              <input type="url" name="twitter" class="form-control" value="{{ profile.twitter|default:'' }}" placeholder="https://twitter.com/username">
            </div>
            <div class="col-md-6">
              <label class="form-label" id="color">YouTube</label>
              <input type="url" name="youtube" class="form-control" value="{{ profile.youtube|default:'' }}" placeholder="https://youtube.com/@username">
            </div>
          </div>
        </div>
      </div>

      <div class="neo-card mb-4">
        <div class="neo-card-inner">
          <div class="section-title ">Education</div>
          <textarea name="education" class="form-control" rows="3">{{ profile.education|default:'' }}</textarea>
        </div>
      </div>

      <div class="neo-card mb-4">
        <div class="neo-card-inner">
          <div class="section-title">Experience</div>
          <textarea name="experience" class="form-control" rows="3">{{ profile.experience|default:'' }}</textarea>
        </div>
      </div>

      <div class="neo-card mb-4">
        <div class="neo-card-inner">
          <div class="section-title">Achievements</div>
          <textarea name="achievements" class="form-control" rows="3">{{ profile.achievements|default:'' }}</textarea>
        </div>
      </div>

      <div class="d-flex gap-2 mb-4 flex-wrap">
        <button type="submit" class="neo-btn neo-btn-primary text-white">
          <i class="bi bi-check-lg"></i> Save Changes
        </button>
        <a href="{% url 'editProfile' %}" class="neo-btn neo-btn-secondary">Cancel</a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const imageInput = document.getElementById('imageUpload');
    const preview = document.getElementById('summaryImage');

    if (imageInput && preview) {
      imageInput.addEventListener('change', function (e) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          alert('File size must be less than 2MB');
          imageInput.value = '';
          return;
        }
        preview.src = URL.createObjectURL(file);
      });
    }
  </script>
</body>
</html>
