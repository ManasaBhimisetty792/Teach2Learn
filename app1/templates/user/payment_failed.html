<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9, #f1f8e9);
            font-family: Arial, sans-serif;
        }

        .success-card {
            background: #ffffff;
            border: none;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
        }

        .success-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #28a745;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: white;
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.35);
        }

        .success-title {
            font-size: 32px;
            font-weight: 700;
            color: #198754;
            margin-bottom: 10px;
        }

        .success-text {
            color: #6c757d;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .payment-details {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .payment-details p {
            margin: 10px 0;
            font-size: 15px;
            color: #343a40;
        }

        .payment-details span {
            font-weight: 600;
            color: #198754;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 12px 22px;
            font-weight: 600;
        }

        .btn-dashboard {
            background-color: #198754;
            color: white;
            border: none;
        }

        .btn-dashboard:hover {
            background-color: #157347;
            color: white;
        }

        .btn-home {
            border: 1px solid #198754;
            color: #198754;
        }

        .btn-home:hover {
            background-color: #198754;
            color: white;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">
            ✓
        </div>

        <h2 class="success-title">Payment Successful</h2>
        <p class="success-text">
            Thank you! Your payment has been processed successfully.
        </p>

        <div class="payment-details">
            <p><strong>Status:</strong> <span>Success</span></p>
            <!-- <p><strong>Payment ID:</strong> {{ payment_id }}</p> -->
            <p><strong>Payment ID:</strong> {{ payment_id|default:"Not received" }}</p>
            <p><strong>Message:</strong> Your premium upgrade is now active.</p>
        </div>
            <p>Redirecting to dashboard...</p>

    <script>
        setTimeout(function () {
            window.location.href = "{% url 'dashboard' %}";
        }, 3000);
    </script>
        </div>
    </div>
</body>
</html>
