<!DOCTYPE html>
<html>
<head>
    <title>Connection Requests</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .request-card{
            border:none;
            border-radius:15px;
            transition:0.3s;
        }

        .request-card:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        .avatar{
            width:60px;
            height:60px;
            border-radius:50%;
            background:#0d6efd;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            font-weight:bold;
        }

        .page-title{
            font-weight:700;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title">
            🤝 Connection Requests
        </h2>

        <span class="badge bg-primary fs-6">
            {{ request_count }} Pending
        </span>

    </div>

    {% for r in requests %}

    <div class="card request-card shadow-sm mb-3">

        <div class="card-body">

            <div class="row align-items-center">

                <div class="col-md-1 text-center">

                    <div class="avatar">
                        {{ r.sender_email|first|upper }}
                    </div>

                </div>

                <div class="col-md-7">

                    <h5 class="mb-1">
                        New Connection Request
                    </h5>

                    <p class="text-muted mb-0">
                        <strong>{{ r.sender_email }}</strong>
                        wants to connect with you.
                    </p>

                </div>

                <div class="col-md-4 text-end">

                    <a href="{% url 'accept_request' r.id %}"
                       class="btn btn-success me-2">

                        ✓ Accept

                    </a>

                    <a href="{% url 'reject_request' r.id %}"
                       class="btn btn-outline-danger">

                        ✕ Reject

                    </a>

                </div>

            </div>

        </div>

    </div>

    {% empty %}

    <div class="card shadow-sm">

        <div class="card-body text-center py-5">

            <h3>🎉</h3>

            <h5>No Pending Requests</h5>

            <p class="text-muted">
                You don't have any connection requests right now.
            </p>

        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
